<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BARBARIAN WORKOUT HUB</title>
    <style>
        :root {
            --bg: #05070a;
            --block-bg: #111418;
            --accent: #ff3c00;
            --accent-glow: rgba(255, 60, 0, 0.6);
            --text: #e2e8f0;
            --text-muted: #64748b;
            --border: #2d3748;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
            margin: 0; padding: 20px; padding-bottom: 80px;
            display: flex; flex-direction: column; align-items: center;
        }

        h1 { font-size: 28px; color: var(--accent); text-shadow: 0 0 15px var(--accent-glow); border-bottom: 4px solid var(--accent); padding-bottom: 10px; margin-bottom: 20px; }
        
        .brutal-card {
            background-color: var(--block-bg);
            border: 3px solid var(--border);
            border-radius: 4px;
            padding: 20px;
            width: 100%;
            max-width: 450px;
            margin-bottom: 20px;
        }

        /* ИНСТРУКЦИЯ */
        #instruction-box {
            display: none;
            border-color: var(--accent);
            background: rgba(255, 60, 0, 0.1);
        }
        .instr-step { margin-bottom: 10px; font-size: 14px; text-transform: none; border-left: 2px solid var(--accent); padding-left: 10px; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .stat-box { background: rgba(0,0,0,0.4); padding: 10px; border: 1px solid var(--border); text-align: center; }
        .stat-value { font-size: 24px; font-weight: 900; color: var(--accent); }

        /* ТАЙМЕР */
        .timer-container { display: flex; flex-direction: column; align-items: center; position: relative; }
        .svg-timer { width: 180px; height: 180px; transform: rotate(-90deg); }
        .circle-bg { fill: none; stroke: var(--border); stroke-width: 10; }
        .circle-progress { fill: none; stroke: var(--accent); stroke-width: 10; stroke-dasharray: 565; stroke-dashoffset: 0; transition: stroke-dashoffset 1s linear; }
        .time-display { position: absolute; top: 70px; font-size: 40px; font-weight: 900; color: var(--accent); }
        
        .slider { -webkit-appearance: none; width: 100%; height: 10px; background: var(--border); margin: 20px 0; }
        .slider::-webkit-slider-thumb { -webkit-appearance: none; width: 25px; height: 25px; background: var(--accent); cursor: pointer; }

        .btn {
            background: var(--accent); color: #000; border: none; padding: 15px;
            font-weight: 900; font-size: 16px; cursor: pointer; width: 100%;
            text-transform: uppercase; margin-bottom: 10px;
        }
        .btn-outline { background: transparent; border: 2px solid var(--accent); color: var(--accent); }

        .workout-item { background: rgba(0,0,0,0.4); padding: 15px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .play-btn { background: var(--accent); border: none; width: 45px; height: 45px; cursor: pointer; font-size: 20px; }
        
        #set-counter { font-size: 20px; color: var(--accent); margin-bottom: 10px; display: block; text-align: center; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <h1>BARBARIAN HUB</h1>

    <div class="brutal-card" id="profile-card">
        <div id="setup-form">
            <input type="number" id="weight" placeholder="ВЕС (КГ)">
            <input type="number" id="max-pullups" placeholder="МАКС ПОДТЯГИВАНИЯ">
            <button class="btn" onclick="saveProfile()">СОХРАНИТЬ БАЗУ</button>
        </div>
        <div id="display-stats" style="display:none;">
            <div class="stats-grid">
                <div class="stat-box">ВЕС: <span class="stat-value" id="view-weight">0</span></div>
                <div class="stat-box">MAX: <span class="stat-value" id="view-pullups">0</span></div>
            </div>
            <button class="btn btn-outline" onclick="showForm()">ОБНОВИТЬ</button>
        </div>
    </div>

    <div class="brutal-card" id="instruction-box">
        <h2 id="instr-title" style="color: var(--accent);">ВЫБЕРИ ТРЕНИРОВКУ</h2>
        <div id="instr-steps"></div>
        <span id="set-counter">ПОДХОД: 1</span>
        <button class="btn" onclick="nextSet()">ПОДХОД ВЫПОЛНЕН</button>
    </div>

    <div class="brutal-card">
        <div class="timer-container">
            <svg class="svg-timer"><circle class="circle-bg" cx="90" cy="90" r="80"></circle><circle class="circle-progress" id="progress-circle" cx="90" cy="90" r="80"></circle></svg>
            <div class="time-display" id="time-display">01:00</div>
        </div>
        <input type="range" min="10" max="300" step="5" value="60" class="slider" id="time-slider" oninput="updateTimeFromSlider()">
        <div style="display: flex; gap: 10px;">
            <button class="btn" id="start-btn" onclick="toggleTimer()">СТАРТ</button>
            <button class="btn btn-outline" onclick="resetTimer()">СБРОС</button>
        </div>
    </div>

    <div class="brutal-card">
        <h2>ПРОГРАММЫ</h2>
        <div class="workout-item">
            <div><h3>5 x MAX</h3><p>Классика на силу</p></div>
            <button class="play-btn" onclick="initWorkout('5max')">▶</button>
        </div>
        <div class="workout-item">
            <div><h3>ЛЕСЕНКА</h3><p>На выносливость</p></div>
            <button class="play-btn" onclick="initWorkout('ladder')">▶</button>
        </div>
        <div class="workout-item">
            <div><h3>ТАБАТА</h3><p>20/10 взрыв</p></div>
            <button class="play-btn" onclick="initWorkout('tabata')">▶</button>
        </div>
    </div>

    <script>
        let currentSet = 1;
        let timerInterval;
        let timeRemaining = 60;
        let totalTime = 60;
        let isRunning = false;

        const programs = {
            '5max': {
                title: "5 x МАКСИМУМ",
                steps: ["Сделай 5 подходов подтягиваний/брусьев.", "В каждом подходе — до отказа.", "Отдых между сетами: 90-120 сек."],
                time: 90
            },
            'ladder': {
                title: "ЛЕСЕНКА (1-10)",
                steps: ["1 подтягивание — отдых 15с.", "2 подтягивания — отдых 30с.", "Прибавляй по одному, пока не упадешь."],
                time: 15
            },
            'tabata': {
                title: "ТАБАТА (ВЗРЫВ)",
                steps: ["20 сек — РАБОТА (макс темп).", "10 сек — ОТДЫХ.", "Всего 8 раундов. Не жалей себя."],
                time: 10
            }
        };

        function initWorkout(type) {
            const p = programs[type];
            document.getElementById('instruction-box').style.display = 'block';
            document.getElementById('instr-title').innerText = p.title;
            const stepsDiv = document.getElementById('instr-steps');
            stepsDiv.innerHTML = p.steps.map(s => `<div class="instr-step">${s}</div>`).join('');
            
            currentSet = 1;
            updateSetDisplay();
            setQuickTimer(p.time);
            window.scrollTo(0, 0);
        }

        function nextSet() {
            currentSet++;
            updateSetDisplay();
            toggleTimer(); // Автозапуск таймера отдыха после нажатия
        }

        function updateSetDisplay() {
            document.getElementById('set-counter').innerText = `ПОДХОД: ${currentSet}`;
        }

        function setQuickTimer(s) {
            resetTimer();
            totalTime = s;
            timeRemaining = s;
            document.getElementById('time-display').innerText = formatTime(s);
            document.getElementById('time-slider').value = s;
        }

        function formatTime(s) {
            return `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;
        }

        function updateTimeFromSlider() {
            if(!isRunning) {
                totalTime = parseInt(document.getElementById('time-slider').value);
                timeRemaining = totalTime;
                document.getElementById('time-display').innerText = formatTime(timeRemaining);
            }
        }

        function toggleTimer() {
            const btn = document.getElementById('start-btn');
            const circle = document.getElementById('progress-circle');
            const circ = 2 * Math.PI * 80;

            if(isRunning) {
                clearInterval(timerInterval);
                btn.innerText = "СТАРТ";
            } else {
                btn.innerText = "ПАУЗА";
                timerInterval = setInterval(() => {
                    timeRemaining--;
                    document.getElementById('time-display').innerText = formatTime(timeRemaining);
                    circle.style.strokeDashoffset = circ - (timeRemaining/totalTime) * circ;

                    if(timeRemaining <= 0) {
                        clearInterval(timerInterval);
                        alert("ВРЕМЯ ВЫШЛО! РАБОТАЙ!");
                        resetTimer();
                    }
                }, 1000);
            }
            isRunning = !isRunning;
        }

        function resetTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            document.getElementById('start-btn').innerText = "СТАРТ";
            document.getElementById('progress-circle').style.strokeDashoffset = 0;
            updateTimeFromSlider();
        }

        function saveProfile() {
            const data = { weight: document.getElementById('weight').value, max: document.getElementById('max-pullups').value };
            localStorage.setItem('workoutData', JSON.stringify(data));
            renderProfile();
        }

        function renderProfile() {
            const saved = localStorage.getItem('workoutData');
            if(saved) {
                const data = JSON.parse(saved);
                document.getElementById('view-weight').innerText = data.weight;
                document.getElementById('view-pullups').innerText = data.max;
                document.getElementById('setup-form').style.display = 'none';
                document.getElementById('display-stats').style.display = 'block';
            }
        }

        function showForm() {
            document.getElementById('setup-form').style.display = 'block';
            document.getElementById('display-stats').style.display = 'none';
        }

        window.onload = () => {
            renderProfile();
            document.getElementById('progress-circle').style.strokeDasharray = 2 * Math.PI * 80;
        };
    </script>
</body>
</html>
