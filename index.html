<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEURAL BARBARIAN | VERSION 4.0 ALPHA</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Oswald:wght@200;700&family=JetBrains+Mono:wght@100;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00f2ff;
            --danger: #ff003c;
            --success: #00ff66;
            --bg: #010203;
            --card: rgba(10, 15, 20, 0.95);
            --border: rgba(0, 242, 255, 0.3);
            --glitch-speed: 0.3s;
        }

        /* ГЛОБАЛЬНЫЙ СТИЛЬ: ТЕХНО-МИНИМАЛИЗМ */
        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body, html { 
            background: var(--bg); color: #fff; 
            font-family: 'Oswald', sans-serif; margin: 0; padding: 0;
            overflow-x: hidden; height: 100%;
        }

        /* ФОНОВЫЙ CANVAS ДВИЖОК */
        #particle-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; opacity: 0.4;
        }

        /* СКАНЕР / HUD ЭФФЕКТЫ */
        .hud-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.1) 0px, rgba(0,0,0,0.1) 1px, transparent 1px, transparent 2px);
            pointer-events: none; z-index: 100; opacity: 0.3;
        }

        /* КОНТЕЙНЕР ПРИЛОЖЕНИЯ */
        .app-container {
            padding: 20px; max-width: 800px; margin: 0 auto;
            display: flex; flex-direction: column; gap: 20px;
        }

        /* ШАПКА В СТИЛЕ КИБЕРПАНК */
        .header {
            border-left: 5px solid var(--neon);
            padding: 20px; background: var(--card);
            position: relative; overflow: hidden;
            box-shadow: 20px 0 50px rgba(0, 242, 255, 0.1);
        }

        .header h1 {
            font-family: 'Orbitron', sans-serif; font-size: 28px;
            margin: 0; letter-spacing: 4px; color: var(--neon);
            text-transform: uppercase; font-weight: 900;
        }

        /* КАРТОЧКИ МОДУЛЕЙ */
        .module {
            background: var(--card); border: 1px solid var(--border);
            padding: 25px; position: relative;
            backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .module:hover { border-color: var(--neon); transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0, 242, 255, 0.15); }
        
        /* УНИКАЛЬНЫЙ ТАЙМЕР "MATRIX" */
        .timer-matrix {
            display: flex; justify-content: center; align-items: center;
            position: relative; margin: 40px 0;
        }
        .timer-ring {
            width: 280px; height: 280px;
            border-radius: 50%; border: 2px solid #111;
            position: relative; display: flex; align-items: center; justify-content: center;
        }
        .timer-svg { position: absolute; top: -10px; left: -10px; width: 300px; height: 300px; transform: rotate(-90deg); }
        .timer-svg circle {
            fill: none; stroke-width: 8; stroke: var(--neon);
            stroke-dasharray: 880; stroke-dashoffset: 880;
            transition: stroke-dashoffset 1s linear;
            stroke-linecap: round;
            filter: drop-shadow(0 0 12px var(--neon));
        }
        .timer-data { text-align: center; z-index: 10; }
        .timer-time { font-family: 'Orbitron'; font-size: 70px; font-weight: 900; color: #fff; line-height: 1; }
        .timer-label { font-size: 14px; color: var(--neon); letter-spacing: 5px; margin-top: 10px; }

        /* КНОПКИ ДЕЙСТВИЯ */
        .btn-neon {
            background: transparent; border: 1px solid var(--neon);
            color: var(--neon); padding: 15px 30px; cursor: pointer;
            font-family: 'Orbitron'; font-size: 12px; font-weight: 900;
            letter-spacing: 2px; position: relative; overflow: hidden;
            transition: 0.3s; width: 100%; text-transform: uppercase;
        }
        .btn-neon:hover { background: var(--neon); color: #000; box-shadow: 0 0 40px var(--neon); }
        .btn-neon::before {
            content: ''; position: absolute; top: 0; left: -100%;
            width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: 0.5s;
        }
        .btn-neon:hover::before { left: 100%; }

        /* АНИМАЦИИ */
        @keyframes pulse { 0% { opacity: 0.8; } 50% { opacity: 1; } 100% { opacity: 0.8; } }
        .active-scan { animation: pulse 2s infinite; color: var(--success) !important; }

        /* СКРЫТЫЕ ЭЛЕМЕНТЫ */
        .hidden { display: none !important; }

    </style>
</head>
<body>
    <canvas id="particle-canvas"></canvas>
    <div class="hud-overlay"></div>

    <div class="app-container">
        <header class="header">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h1>NEURAL HUB V4.0</h1>
                    <div id="os-status" style="font-size: 10px; color: var(--neon); font-family: 'JetBrains Mono'; margin-top: 5px;">
                        SYSTEM: ACTIVE | CPU: OPTIMIZED | USER: BARBARIAN
                    </div>
                </div>
                <div style="text-align: right;">
                    <div id="weather-core" style="font-size: 18px; font-weight: 900;">22°C CLEAR</div>
                    <div id="location-data" style="font-size: 9px; color: var(--tm);">LAT: 53.9045 | LON: 27.5615</div>
                </div>
            </div>
        </header>

        <section class="module">
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                <span style="font-family: 'Orbitron';">RANK: <span id="rank-name" style="color: var(--neon);">WARRIOR</span></span>
                <span>LEVEL <span id="lvl-val" style="color: var(--neon);">12</span></span>
            </div>
            <div style="width: 100%; height: 4px; background: #111; position: relative;">
                <div id="xp-progress" style="width: 65%; height: 100%; background: var(--neon); box-shadow: 0 0 10px var(--neon);"></div>
            </div>
            <div style="display: flex; justify-content: space-between; font-size: 10px; margin-top: 5px; color: #555;">
                <span>EXP: 4500 / 6000</span>
                <span>ACHIEVEMENTS: 14/50</span>
            </div>
        </section>

        <section class="module">
            <div class="timer-matrix">
                <div class="timer-ring">
                    <svg class="timer-svg">
                        <circle cx="150" cy="150" r="140" id="timer-progress-path"></circle>
                    </svg>
                    <div class="timer-data">
                        <div class="timer-time" id="timer-main">01:30</div>
                        <div class="timer-label" id="timer-state">STANDBY</div>
                    </div>
                </div>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <button class="btn-neon" onclick="engine.timer.start()">ENGAGE</button>
                <button class="btn-neon" style="border-color: #555; color: #555;" onclick="engine.timer.reset()">ABORT</button>
            </div>
        </section>

        <section class="module" id="bio-module">
            <h2 style="font-size: 14px; letter-spacing: 2px; margin-bottom: 20px;">BIO-RECOVERY STATUS</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; text-align: center;">
                <div style="padding: 10px; border: 1px solid #111;">
                    <div style="font-size: 9px; color: #555;">ARMS</div>
                    <div style="color: var(--success); font-weight: 900;">98%</div>
                </div>
                <div style="padding: 10px; border: 1px solid #111;">
                    <div style="font-size: 9px; color: #555;">BACK</div>
                    <div style="color: var(--danger); font-weight: 900;">24%</div>
                </div>
                <div style="padding: 10px; border: 1px solid #111;">
                    <div style="font-size: 9px; color: #555;">CORE</div>
                    <div style="color: orange; font-weight: 900;">65%</div>
                </div>
            </div>
        </section>

    </div>

    <script>
        /* NEURAL ENGINE CORE 
           Здесь начинается масштабная логика 
        */
        const engine = {
            state: {
                timer: { val: 90, active: false, initial: 90 },
                user: { xp: 4500, lvl: 12, logs: [] },
                weather: { temp: 22, city: 'Barysaw' }
            },

            init: function() {
                this.graphics.startParticles();
                this.utils.startClock();
                console.log("NEURAL CORE INITIALIZED...");
            },

            /* ГРАФИЧЕСКИЙ ДВИЖОК CANVAS */
            graphics: {
                startParticles: function() {
                    const canvas = document.getElementById('particle-canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;

                    let particles = [];
                    for(let i=0; i<80; i++) {
                        particles.push({
                            x: Math.random() * canvas.width,
                            y: Math.random() * canvas.height,
                            vx: (Math.random() - 0.5) * 0.5,
                            vy: (Math.random() - 0.5) * 0.5,
                            size: Math.random() * 2
                        });
                    }

                    function animate() {
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                        ctx.fillStyle = '#00f2ff';
                        particles.forEach(p => {
                            p.x += p.vx; p.y += p.vy;
                            if(p.x < 0 || p.x > canvas.width) p.vx *= -1;
                            if(p.y < 0 || p.y > canvas.height) p.vy *= -1;
                            ctx.beginPath();
                            ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                            ctx.fill();
                        });
                        requestAnimationFrame(animate);
                    }
                    animate();
                }
            },

            timer: {
                start: function() {
                    if(this.active) return;
                    this.active = true;
                    document.getElementById('timer-state').innerText = "RECOVERING";
                    document.getElementById('timer-state').classList.add('active-scan');
                    // Тут будет продолжение логики...
                },
                reset: function() {
                    location.reload(); // Простой сброс для теста
                }
            },

            utils: {
                startClock: function() {
                    setInterval(() => {
                        const now = new Date();
                        // Логика системного времени
                    }, 1000);
                }
            }
        };

        engine.init();
    </script>
</body>
</html>
