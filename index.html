<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BARBARIAN ULTIMATE HUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff3c00;
            --primary-glow: rgba(255, 60, 0, 0.5);
            --bg: #050505;
            --card-bg: #111;
            --border: #222;
            --text: #eee;
            --success: #00ff66;
        }

        /* ОСНОВНОЙ СТИЛЬ */
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Oswald', sans-serif;
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
        }

        h1, h2 { font-family: 'Orbitron', sans-serif; text-transform: uppercase; letter-spacing: 2px; }

        .header {
            width: 100%; max-width: 500px;
            text-align: center; margin-bottom: 20px;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 10px;
            box-shadow: 0 10px 20px -10px var(--primary-glow);
        }

        /* ПОГОДА И ИНФО */
        .top-info {
            display: flex; justify-content: space-between;
            width: 100%; max-width: 500px; margin-bottom: 15px;
            font-size: 12px; color: #888;
        }

        /* КАРТОЧКИ */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            width: 100%; max-width: 500px;
            padding: 20px; margin-bottom: 20px;
            position: relative; overflow: hidden;
        }

        .card::before {
            content: ''; position: absolute; top: 0; left: 0;
            width: 4px; height: 100%; background: var(--primary);
        }

        /* RPG СИСТЕМА */
        .rpg-bar {
            width: 100%; height: 10px; background: #222;
            margin: 10px 0; border-radius: 5px; overflow: hidden;
        }
        #exp-fill { height: 100%; width: 0%; background: var(--primary); transition: 0.5s; box-shadow: 0 0 10px var(--primary); }

        /* ТАЙМЕР - ЦЕНТРАЛЬНЫЙ ЭЛЕМЕНТ */
        .timer-wrap {
            position: relative; width: 220px; height: 220px;
            margin: 20px auto;
        }
        .timer-svg { transform: rotate(-90deg); width: 220px; height: 220px; }
        .timer-circle-bg { fill: none; stroke: #1a1a1a; stroke-width: 10; }
        .timer-circle-prod { fill: none; stroke: var(--primary); stroke-width: 10; stroke-dasharray: 628; stroke-dashoffset: 628; transition: 1s linear; }
        .timer-text {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px; font-family: 'Orbitron'; font-weight: 900;
            color: var(--primary); text-shadow: 0 0 15px var(--primary-glow);
        }

        /* УПРАВЛЕНИЕ */
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn {
            background: #1a1a1a; border: 1px solid var(--primary);
            color: var(--primary); padding: 15px; font-weight: bold;
            text-transform: uppercase; cursor: pointer; transition: 0.2s;
            font-family: 'Orbitron'; font-size: 14px;
        }
        .btn:active { background: var(--primary); color: #000; }
        .btn.active { background: var(--primary); color: #000; box-shadow: 0 0 20px var(--primary-glow); }

        /* ИНСТРУКЦИИ И МОТИВАЦИЯ */
        .instr-content { background: #000; padding: 15px; border: 1px dashed var(--border); margin-top: 15px; }
        .motivator { font-style: italic; color: var(--success); text-align: center; margin-top: 10px; }

        /* ВВОД ДАННЫХ */
        input {
            background: #000; border: 1px solid var(--border);
            color: #fff; padding: 10px; width: 100%; margin-bottom: 10px;
            font-family: 'Oswald';
        }

        /* ТАБЛИЦА ИСТОРИИ */
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { text-align: left; color: var(--primary); padding-bottom: 5px; }
        td { border-bottom: 1px solid #222; padding: 8px 0; }

        /* АНИМАЦИИ */
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .working { animation: pulse 1s infinite; color: var(--success) !important; }

    </style>
</head>
<body>

    <div class="top-info">
        <div id="weather">ЗАГРУЗКА ПОГОДЫ...</div>
        <div id="date">01.01.2024</div>
    </div>

    <div class="header">
        <h1>BARBARIAN HUB <span id="lvl-display" style="font-size: 14px; color: var(--primary);">LVL 1</span></h1>
        <div class="rpg-bar"><div id="exp-fill"></div></div>
    </div>

    <div class="card" id="profile-card">
        <div id="profile-setup">
            <h2>РЕГИСТРАЦИЯ ВОИНА</h2>
            <input type="number" id="weight" placeholder="ТВОЙ ВЕС (КГ)">
            <input type="number" id="pullups-max" placeholder="MAX ПОДТЯГИВАНИЙ">
            <input type="number" id="pushups-max" placeholder="MAX ОТЖИМАНИЙ">
            <button class="btn" style="width: 100%;" onclick="saveProfile()">АКТИВИРОВАТЬ</button>
        </div>
        <div id="profile-stats" style="display: none;">
            <div style="display: flex; justify-content: space-around;">
                <div style="text-align: center;">ВЕС<br><span id="s-weight" class="timer-text" style="position:static; font-size: 24px;">0</span></div>
                <div style="text-align: center;">MAX<br><span id="s-max" class="timer-text" style="position:static; font-size: 24px;">0</span></div>
            </div>
            <button class="btn" style="width: 100%; margin-top: 15px; font-size: 10px;" onclick="editProfile()">РЕДАКТИРОВАТЬ</button>
        </div>
    </div>

    <div class="card">
        <h2>ВЫБОР ОРУЖИЯ</h2>
        <div class="btn-grid">
            <button class="btn" id="btn-5max" onclick="setProgram('5max')">5 X MAX</button>
            <button class="btn" id="btn-ladder" onclick="setProgram('ladder')">ЛЕСЕНКА</button>
            <button class="btn" id="btn-tabata" onclick="setProgram('tabata')">ТАБАТА</button>
            <button class="btn" id="btn-custom" onclick="setProgram('custom')">СВОЯ</button>
        </div>

        <div id="prog-details" class="instr-content" style="display: none;">
            <h3 id="prog-title" style="color: var(--primary); margin: 0;"></h3>
            <p id="prog-desc" style="font-size: 13px; text-transform: none; color: #aaa;"></p>
            <div id="workout-steps"></div>
        </div>
    </div>

    <div class="card" style="text-align: center;">
        <h2 id="timer-status">ОТДЫХ</h2>
        <div class="timer-wrap">
            <svg class="timer-svg">
                <circle class="timer-circle-bg" cx="110" cy="110" r="100"></circle>
                <circle class="timer-circle-prod" id="progress" cx="110" cy="110" r="100"></circle>
            </svg>
            <div class="timer-text" id="display">01:30</div>
        </div>
        <div class="btn-grid">
            <button class="btn" onclick="startTimer()">СТАРТ</button>
            <button class="btn btn-outline" onclick="resetTimer()">СБРОС</button>
        </div>
        <div class="motivator" id="quote">«ЛИБО ТЫ, ЛИБО СНАРЯД»</div>
    </div>

    <div class="card">
        <h2>ЖУРНАЛ СЛАВЫ</h2>
        <table id="history-table">
            <thead>
                <tr>
                    <th>ДАТА</th>
                    <th>ПРОГРАММА</th>
                    <th>SET</th>
                    <th>EXP</th>
                </tr>
            </thead>
            <tbody id="history-body">
                </tbody>
        </table>
    </div>

    <script>
        // --- ДАННЫЕ И СОСТОЯНИЕ ---
        let state = {
            lvl: 1,
            exp: 0,
            currentProg: null,
            time: 90,
            timerActive: false,
            interval: null,
            setsDone: 0
        };

        const programs = {
            '5max': { t: "5 X MAX", d: "5 подходов на максимум. Отдых 120с.", s: 120, exp: 50 },
            'ladder': { t: "ЛЕСЕНКА", d: "1, 2, 3... до упора. Отдых = кол-во повторов x 5с.", s: 30, exp: 30 },
            'tabata': { t: "ТАБАТА", d: "20с работа / 10с отдых. 8 раундов.", s: 10, exp: 100 },
            'custom': { t: "СВОЯ ТРЕНИРОВКА", d: "Настрой таймер под себя.", s: 60, exp: 20 }
        };

        const quotes = [
            "БОЛЬ — ЭТО СЛАБОСТЬ, ПОКИДАЮЩАЯ ТЕЛО.",
            "ТВОИ МЫШЦЫ НЕ ЗНАЮТ СЧЕТА, ОНИ ЗНАЮТ ТОЛЬКО БОЛЬ.",
            "ЕЩЕ ОДИН ПОВТОР, ВОИН!",
            "СЕГОДНЯ ЛУЧШЕ, ЧЕМ ВЧЕРА.",
            "ЖЕЛЕЗО НЕ ВРЕТ."
        ];

        // --- ИНИЦИАЛИЗАЦИЯ ---
        window.onload = () => {
            loadData();
            updateWeather();
            setInterval(updateClock, 1000);
            updateQuotes();
        };

        function updateClock() {
            document.getElementById('date').innerText = new Date().toLocaleTimeString();
        }

        async function updateWeather() {
            try {
                const res = await fetch('https://wttr.in/?format=3');
                const text = await res.text();
                document.getElementById('weather').innerText = text.toUpperCase();
            } catch (e) {
                document.getElementById('weather').innerText = "ВЫХОДИ НА УЛИЦУ И ПРОВЕРЬ";
            }
        }

        // --- ПРОФИЛЬ ---
        function saveProfile() {
            const w = document.getElementById('weight').value;
            const m = document.getElementById('pullups-max').value;
            if(!w || !m) return alert("ВВЕДИ ДАННЫЕ!");
            
            localStorage.setItem('bb_profile', JSON.stringify({weight: w, max: m}));
            showProfileStats(w, m);
        }

        function showProfileStats(w, m) {
            document.getElementById('profile-setup').style.display = 'none';
            document.getElementById('profile-stats').style.display = 'block';
            document.getElementById('s-weight').innerText = w;
            document.getElementById('s-max').innerText = m;
        }

        function editProfile() {
            document.getElementById('profile-setup').style.display = 'block';
            document.getElementById('profile-stats').style.display = 'none';
        }

        // --- ТРЕНИРОВКА ---
        function setProgram(key) {
            state.currentProg = key;
            const p = programs[key];
            
            // UI
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + key).classList.add('active');
            
            document.getElementById('prog-details').style.display = 'block';
            document.getElementById('prog-title').innerText = p.t;
            document.getElementById('prog-desc').innerText = p.d;
            
            state.time = p.s;
            resetTimer();
        }

        // --- ТАЙМЕР ---
        function startTimer() {
            if(state.timerActive) {
                clearInterval(state.interval);
                state.timerActive = false;
                document.getElementById('timer-status').innerText = "ПАУЗА";
                return;
            }

            state.timerActive = true;
            document.getElementById('timer-status').innerText = "ОТДЫХАЙ";
            document.getElementById('timer-status').classList.add('working');

            const circle = document.getElementById('progress');
            const circumference = 628;
            let startT = state.time;

            state.interval = setInterval(() => {
                state.time--;
                updateDisplay();
                
                let offset = circumference - (state.time / startT) * circumference;
                circle.style.strokeDashoffset = offset;

                if(state.time <= 0) {
                    finishTimer();
                }
            }, 1000);
        }

        function finishTimer() {
            clearInterval(state.interval);
            state.timerActive = false;
            document.getElementById('timer-status').innerText = "В БОЙ!";
            document.getElementById('timer-status').classList.remove('working');
            
            // Вибрация и звук
            if (navigator.vibrate) navigator.vibrate([500, 200, 500]);
            speak("ВРЕМЯ ВЫШЛО. НА СНАРЯД!");
            
            addExp();
            saveHistory();
            resetTimer();
        }

        function resetTimer() {
            clearInterval(state.interval);
            state.timerActive = false;
            state.time = state.currentProg ? programs[state.currentProg].s : 90;
            updateDisplay();
            document.getElementById('progress').style.strokeDashoffset = 628;
            document.getElementById('timer-status').innerText = "ГОТОВ";
        }

        function updateDisplay() {
            const m = Math.floor(state.time / 60);
            const s = state.time % 60;
            document.getElementById('display').innerText = `${m}:${s < 10 ? '0'+s : s}`;
        }

        // --- RPG СИСТЕМА ---
        function addExp() {
            let gain = state.currentProg ? programs[state.currentProg].exp : 10;
            state.exp += gain;
            
            if(state.exp >= 100) {
                state.lvl++;
                state.exp = 0;
                speak("НОВЫЙ УРОВЕНЬ ДОСТИГНУТ!");
            }
            
            updateRPG();
            localStorage.setItem('bb_rpg', JSON.stringify({lvl: state.lvl, exp: state.exp}));
        }

        function updateRPG() {
            document.getElementById('lvl-display').innerText = `LVL ${state.lvl}`;
            document.getElementById('exp-fill').style.width = state.exp + '%';
        }

        // --- ИСТОРИЯ ---
        function saveHistory() {
            const row = {
                date: new Date().toLocaleDateString(),
                prog: state.currentProg || 'BATTLE',
                exp: state.currentProg ? programs[state.currentProg].exp : 10
            };
            
            let history = JSON.parse(localStorage.getItem('bb_history') || '[]');
            history.unshift(row);
            if(history.length > 5) history.pop();
            localStorage.setItem('bb_history', JSON.stringify(history));
            renderHistory();
        }

        function renderHistory() {
            const history = JSON.parse(localStorage.getItem('bb_history') || '[]');
            const body = document.getElementById('history-body');
            body.innerHTML = history.map(h => `
                <tr>
                    <td>${h.date}</td>
                    <td>${h.prog.toUpperCase()}</td>
                    <td>1</td>
                    <td style="color:var(--primary)">+${h.exp}</td>
                </tr>
            `).join('');
        }

        // --- ДОП ФУНКЦИИ ---
        function speak(text) {
            const msg = new SpeechSynthesisUtterance();
            msg.text = text;
            msg.lang = 'ru-RU';
            window.speechSynthesis.speak(msg);
        }

        function updateQuotes() {
            setInterval(() => {
                document.getElementById('quote').innerText = quotes[Math.floor(Math.random() * quotes.length)];
            }, 10000);
        }

        function loadData() {
            const prof = JSON.parse(localStorage.getItem('bb_profile'));
            if(prof) showProfileStats(prof.weight, prof.max);
            
            const rpg = JSON.parse(localStorage.getItem('bb_rpg'));
            if(rpg) { state.lvl = rpg.lvl; state.exp = rpg.exp; updateRPG(); }
            
            renderHistory();
        }

        function updateTimeFromSlider() {
            // Реализация кастомного времени через слайдер
        }
    </script>
</body>
</html>
