<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CoolInstall Apex 23.0 | Master Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --accent: #00f2ff;
            --bg: #05070a;
            --card-bg: rgba(255, 255, 255, 0.02);
            --border: rgba(255, 255, 255, 0.08);
            --danger: #ff0055;
            --success: #00ffaa;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #fff; line-height: 1.6; -webkit-tap-highlight-color: transparent; scroll-behavior: smooth; }
        
        .header-progress { position: fixed; top: 0; left: 0; right: 0; height: 70px; background: rgba(5,7,10,0.9); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border); z-index: 2000; padding: 10px 20px; }
        .p-bar-bg { width: 100%; height: 4px; background: #111; border-radius: 2px; margin-top: 8px; }
        .p-bar-fill { width: 0%; height: 100%; background: var(--accent); box-shadow: 0 0 15px var(--accent); transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1); }

        .bento { background: var(--card-bg); border: 1px solid var(--border); border-radius: 24px; padding: 25px; }
        .neon-text { color: var(--accent); text-shadow: 0 0 10px rgba(0, 242, 255, 0.3); }
        
        input, select { background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 12px; padding: 14px; color: white; width: 100%; outline: none; font-size: 14px; }
        input:focus { border-color: var(--accent); }

        .tool-item { border: 1px solid var(--border); border-radius: 15px; padding: 12px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 10px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .tool-item.active { border-color: var(--accent); background: rgba(0, 242, 255, 0.05); color: var(--accent); }

        .step-node { border-left: 2px solid var(--border); padding-left: 20px; position: relative; margin-bottom: 30px; }
        .step-node::before { content: ''; position: absolute; left: -6px; top: 5px; width: 10px; height: 10px; background: var(--border); border-radius: 50%; transition: 0.3s; }
        .step-node.active::before { background: var(--accent); box-shadow: 0 0 10px var(--accent); }

        .btn-action { background: var(--accent); color: #000; font-weight: 900; text-transform: uppercase; border-radius: 12px; padding: 16px; width: 100%; border: none; cursor: pointer; transition: 0.3s; }
        .btn-outline { border: 1px solid var(--danger); color: var(--danger); padding: 12px; border-radius: 12px; width: 100%; font-weight: 800; font-size: 10px; text-transform: uppercase; margin-top: 15px; }

        /* Game Styles */
        .game-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 15px; padding: 15px; font-size: 10px; font-weight: 800; color: #666; cursor: pointer; transition: 0.2s; }
        .game-btn.active { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 10px var(--accent); }
        .terminal { background: #000; border-radius: 15px; padding: 15px; font-family: monospace; font-size: 11px; color: var(--success); min-height: 100px; border: 1px solid #111; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 3000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #0a0c10; border: 2px solid var(--danger); border-radius: 30px; padding: 30px; max-width: 400px; text-align: center; }

        nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: rgba(5,7,10,0.8); backdrop-filter: blur(15px); border: 1px solid var(--border); border-radius: 20px; height: 60px; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-item { color: #444; }
        .nav-item.active { color: var(--accent); }
    </style>
</head>
<body class="pt-24 pb-32">

    <!-- TOP PROGRESS -->
    <div class="header-progress">
        <div class="flex justify-between items-end">
            <span class="text-[10px] font-black tracking-widest text-gray-500 uppercase">Ранг: <span id="statusTxt" class="text-accent">Новичок</span></span>
            <span id="percentTxt" class="text-xs font-black italic">0%</span>
        </div>
        <div class="p-bar-bg"><div class="p-bar-fill" id="pBar"></div></div>
    </div>

    <main class="max-w-2xl mx-auto px-6 space-y-12">

        <!-- 01. CALCULATOR -->
        <section id="calc" class="space-y-6">
            <h2 class="text-xl font-black uppercase tracking-widest italic opacity-40">01. Проектирование</h2>
            <div class="bento space-y-5">
                <div class="grid grid-cols-2 gap-3">
                    <input type="number" id="area" placeholder="Площадь м²" oninput="upd()">
                    <input type="number" id="height" value="2.7" oninput="upd()">
                </div>
                <button class="btn-action" onclick="runCalc()">Рассчитать</button>
                <div id="resBox" class="hidden p-5 rounded-xl bg-accent/5 border border-accent/20 text-center">
                    <p id="resP" class="text-3xl font-black italic">0.0 кВт</p>
                    <p id="resB" class="text-[10px] font-bold text-gray-500 uppercase mt-1"></p>
                </div>
            </div>
        </section>

        <!-- 03. TOOLS -->
        <section class="space-y-6">
            <h2 class="text-xl font-black uppercase tracking-widest italic opacity-40">02. Подготовка</h2>
            <div class="grid grid-cols-2 gap-2 text-center">
                <div class="tool-item" onclick="toggleT(this)">Вакуумный насос</div>
                <div class="tool-item" onclick="toggleT(this)">Вальцовка</div>
                <div class="tool-item" onclick="toggleT(this)">Труборез</div>
                <div class="tool-item" onclick="toggleT(this)">Манометр</div>
            </div>
        </section>

        <!-- 05. LEAK TEST -->
        <section class="space-y-6">
            <h2 class="text-xl font-black uppercase tracking-widest italic opacity-40">03. Контроль</h2>
            <div class="bento text-center space-y-4">
                <div id="timerDisp" class="text-5xl font-black tracking-tighter text-rose-500 tabular-nums">20:00</div>
                <button class="btn-action" id="tBtn" onclick="startTimer()">Запустить тест пены</button>
            </div>
        </section>

        <!-- 06. GAME: STARTUP SIMULATOR -->
        <section id="game" class="space-y-6">
            <h2 class="text-xl font-black uppercase tracking-widest italic text-accent">04. Симулятор пуска</h2>
            <div class="bento space-y-4">
                <p class="text-[11px] text-gray-400 italic">Сможешь запустить AC без взрыва? Нажимай на действия в правильном порядке.</p>
                
                <div class="terminal" id="term">System: Waiting for input...</div>
                
                <div class="grid grid-cols-2 gap-3">
                    <button class="game-btn" onclick="gameAction('vac', this)">ВКЛ ВАКУУМНЫЙ НАСОС</button>
                    <button class="game-btn" onclick="gameAction('leak', this)">ПРОВЕРИТЬ УТЕЧКИ ПЕНОЙ</button>
                    <button class="game-btn" onclick="gameAction('valves', this)">ОТКРЫТЬ ВЕНТИЛИ ГАЗА</button>
                    <button class="game-btn" onclick="gameAction('power', this)">ПОДАТЬ ПИТАНИЕ 220V</button>
                </div>
                <button class="btn-outline" style="border-color: #555; color: #555" onclick="resetGame()">Сброс системы</button>
            </div>
        </section>

    </main>

    <!-- Modal Error Game -->
    <div class="modal" id="gameErr">
        <div class="modal-content">
            <h2 class="text-danger font-black text-xl uppercase">ОШИБКА МОНТАЖА! 🛑</h2>
            <p id="gameErrTxt" class="text-xs text-gray-400 my-5 font-medium"></p>
            <button class="btn-action" style="background: #fff" onclick="resetGame()">Попробовать снова</button>
        </div>
    </div>

    <nav>
        <a href="#calc" class="nav-item active"><i class="fa-solid fa-calculator"></i></a>
        <a href="#game" class="nav-item"><i class="fa-solid fa-gamepad"></i></a>
        <a href="#timerDisp" class="nav-item"><i class="fa-solid fa-clock"></i></a>
    </nav>

    <script>
        let points = { calc: 0, tools: 0, timer: 0, game: 0 };

        function upd() {
            let total = points.calc + points.tools + points.timer + points.game;
            document.getElementById('pBar').style.width = total + '%';
            document.getElementById('percentTxt').innerText = total + '%';
            let status = total < 30 ? "Новичок" : total < 60 ? "Техник" : total < 90 ? "Инженер" : "Мастер Климата";
            document.getElementById('statusTxt').innerText = status;
        }

        function runCalc() {
            if(!document.getElementById('area').value) return;
            points.calc = 25;
            document.getElementById('resBox').classList.remove('hidden');
            let p = (document.getElementById('area').value / 10);
            document.getElementById('resP').innerText = p.toFixed(1) + " кВт";
            document.getElementById('resB').innerText = p < 2.6 ? "Модель: 7-ка" : "Модель: 9-ка";
            upd();
        }

        function toggleT(el) {
            el.classList.toggle('active');
            points.tools = document.querySelectorAll('#tools .active').length * 6.25;
            upd();
        }

        let timer;
        function startTimer() {
            if(timer) return;
            let time = 1200; points.timer = 25; upd();
            timer = setInterval(() => {
                let m = Math.floor(time/60), s = time%60;
                document.getElementById('timerDisp').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                if(time-- <= 0) clearInterval(timer);
            }, 1000);
        }

        // GAME LOGIC
        let gameStep = 0;
        function gameAction(type, el) {
            const term = document.getElementById('term');
            if (el.classList.contains('active')) return;

            if (type === 'vac' && gameStep === 0) {
                log("Vacuuming... OK (Air & Moisture removed)");
                nextStep(el);
            } else if (type === 'leak' && gameStep === 1) {
                log("Leak Test... OK (No bubbles detected)");
                nextStep(el);
            } else if (type === 'valves' && gameStep === 2) {
                log("Opening Valves... OK (Freon entering system)");
                nextStep(el);
            } else if (type === 'power' && gameStep === 3) {
                log("System Powering Up... SUCCESS! COOLING ON.");
                el.classList.add('active');
                points.game = 25;
                upd();
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#00f2ff', '#ffffff'] });
            } else {
                showGameError(type);
            }
        }

        function nextStep(el) {
            el.classList.add('active');
            gameStep++;
        }

        function log(msg) {
            const term = document.getElementById('term');
            term.innerHTML += `<br>> ${msg}`;
        }

        function showGameError(type) {
            const modal = document.getElementById('gameErr');
            const txt = document.getElementById('gameErrTxt');
            modal.style.display = 'flex';
            if (type === 'valves' && gameStep < 2) {
                txt.innerText = "КРИТИЧЕСКАЯ ОШИБКА: Ты открыл фреон, не удалив воздух вакуумом! Влага внутри превратится в лед, и компрессор сгорит через неделю.";
            } else if (type === 'power' && gameStep < 3) {
                txt.innerText = "ОШИБКА: Запуск компрессора без фреона (вентили закрыты) приведет к перегреву и поломке за 60 секунд.";
            } else {
                txt.innerText = "ОШИБКА: Нарушена технологическая последовательность. Настоящий инженер сначала проверяет систему, а потом запускает.";
            }
        }

        function resetGame() {
            gameStep = 0;
            points.game = 0;
            document.getElementById('term').innerText = "System: Waiting for input...";
            document.querySelectorAll('.game-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('gameErr').style.display = 'none';
            upd();
        }
    </script>
</body>
</html>
