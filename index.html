<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HVAC Expert Pro | Belarus Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #27ae60;
            --danger: #e74c3c;
            --rb-red: #cc0000;
            --light: #ecf0f1;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            color: var(--primary);
        }

        .app-header {
            background: var(--primary);
            color: white;
            padding: 20px;
            text-align: center;
            border-bottom: 5px solid var(--rb-red);
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .status-bar {
            background: #dfe6e9;
            padding: 5px 15px;
            font-size: 0.8rem;
            display: flex;
            justify-content: space-between;
        }

        .main-content {
            padding: 15px;
            max-width: 800px;
            margin: auto;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .card h3 {
            margin-top: 0;
            border-bottom: 2px solid var(--light);
            padding-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 0.9rem;
            margin-bottom: 5px;
            font-weight: 600;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--light);
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
        }

        /* Таймер в стиле приборной панели */
        .timer-container {
            text-align: center;
            padding: 30px 0;
            background: #2d3436;
            border-radius: 12px;
            color: #55efc4;
            margin: 15px 0;
        }

        #timer {
            font-family: 'Courier New', Courier, monospace;
            font-size: 4rem;
            text-shadow: 0 0 15px #55efc4;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn {
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: transform 0.1s, opacity 0.3s;
        }

        .btn:active { transform: scale(0.98); }
        .btn-primary { background: var(--accent); color: white; }
        .btn-secondary { background: var(--primary); color: white; }
        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }

        .legal-notice {
            background: #fff3cd;
            border-left: 5px solid #ffc107;
            padding: 15px;
            font-size: 0.85rem;
            margin-top: 20px;
        }

        .hidden { display: none; }

        @media (max-width: 480px) {
            #timer { font-size: 3rem; }
        }
    </style>
</head>
<body>

<div class="app-header">
    <i class="fas fa-snowflake fa-2x"></i>
    <h1 style="margin: 10px 0 0 0; font-size: 1.5rem;">HVAC BELARUS PRO</h1>
</div>

<div class="status-bar">
    <span id="date-display"></span>
    <span>Версия 2.0.4 (RB)</span>
</div>

<div class="main-content">
    
    <div class="card" id="step1">
        <h3><i class="fas fa-file-invoice"></i> Данные объекта</h3>
        <div class="input-group">
            <label>ФИО Заказчика / Организация</label>
            <input type="text" id="client" placeholder="Иванов И.И.">
        </div>
        <div class="input-group">
            <label>Адрес (РБ)</label>
            <input type="text" id="address" placeholder="Минск, пр. Независимости, 1">
        </div>
        <div class="input-group">
            <label>УНП исполнителя (для акта)</label>
            <input type="number" id="unp" placeholder="123456789">
        </div>
        <button class="btn btn-primary" style="width: 100%;" onclick="toStep(2)">Далее: Вакуумирование <i class="fas fa-arrow-right"></i></button>
    </div>

    <div class="card hidden" id="step2">
        <h3><i class="fas fa-tachometer-alt"></i> Вакуумирование</h3>
        <div class="timer-container">
            <div id="timer">15:00</div>
            <div style="font-size: 0.8rem; color: #aaa;">УДАЛЕНИЕ ВЛАГИ ИЗ КОНТУРА</div>
        </div>
        <div class="btn-grid">
            <button class="btn btn-primary" onclick="toggleTimer()" id="timerBtn"><i class="fas fa-play"></i> Старт</button>
            <button class="btn btn-outline" onclick="toStep(3)">Пропустить <i class="fas fa-forward"></i></button>
        </div>
    </div>

    <div class="card hidden" id="step3">
        <h3><i class="fas fa-tools"></i> Пуск и наладка</h3>
        <div class="input-group">
            <label>Давление на всасывании (Bar)</label>
            <input type="number" step="0.1" id="press" placeholder="8.5">
        </div>
        <div class="input-group">
            <label>Температура на выходе (°C)</label>
            <input type="number" id="temp" placeholder="7">
        </div>
        <div class="input-group">
            <label>Комментарий / Модель</label>
            <textarea id="model" rows="2"></textarea>
        </div>
        
        <button class="btn btn-primary" style="width: 100%; margin-bottom: 10px;" onclick="savePDF()">
            <i class="fas fa-file-pdf"></i> СФОРМИРОВАТЬ АКТ (PDF)
        </button>
        <button class="btn btn-outline" style="width: 100%;" onclick="location.reload()">Новый заказ</button>
    </div>

    <div class="legal-notice">
        <strong>ВНИМАНИЕ:</strong> Согласно Постановлению Совмина РБ №384, установка кондиционера на фасадах жилых домов требует предварительного согласования с местным исполнительным органом.
    </div>
</div>

<script>
    // Автоматическая дата
    document.getElementById('date-display').innerText = new Date().toLocaleDateString();

    let time = 15 * 60;
    let timerRunning = false;
    let interval;

    function toStep(n) {
        document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));
        document.getElementById('step' + n).classList.remove('hidden');
        window.scrollTo(0,0);
    }

    function toggleTimer() {
        const btn = document.getElementById('timerBtn');
        if (!timerRunning) {
            timerRunning = true;
            btn.innerHTML = '<i class="fas fa-pause"></i> Пауза';
            interval = setInterval(() => {
                time--;
                updateTimerDisplay();
                if (time <= 0) {
                    clearInterval(interval);
                    toStep(3);
                }
            }, 1000);
        } else {
            timerRunning = false;
            clearInterval(interval);
            btn.innerHTML = '<i class="fas fa-play"></i> Старт';
        }
    }

    function updateTimerDisplay() {
        let m = Math.floor(time / 60);
        let s = time % 60;
        document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
    }

    function savePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        const client = document.getElementById('client').value || 'Не указан';
        const addr = document.getElementById('address').value || 'Не указан';
        const unp = document.getElementById('unp').value || '---';
        const p = document.getElementById('press').value || '-';
        const t = document.getElementById('temp').value || '-';
        const m = document.getElementById('model').value || 'Стандарт';

        doc.setFont("helvetica", "bold");
        doc.text("АКТ ПУСКО-НАЛАДОЧНЫХ РАБОТ (РБ)", 105, 20, { align: "center" });
        
        doc.setFont("helvetica", "normal");
        doc.setFontSize(10);
        doc.text(`Дата: ${new Date().toLocaleDateString()}`, 20, 40);
        doc.text(`УНП Исполнителя: ${unp}`, 20, 50);
        doc.text(`Заказчик: ${client}`, 20, 60);
        doc.text(`Адрес: ${addr}`, 20, 70);
        
        doc.line(20, 75, 190, 75);
        
        doc.text("ТЕХНИЧЕСКИЕ ПАРАМЕТРЫ:", 20, 85);
        doc.text(`Модель: ${m}`, 25, 95);
        doc.text(`Рабочее давление: ${p} Bar`, 25, 105);
        doc.text(`Температура на выходе: ${t} C`, 25, 115);
        
        doc.text("Заключение: Система герметична, параметры в норме.", 20, 130);
        doc.setFontSize(8);
        doc.text("Работы выполнены согласно Постановлению СМ РБ №384.", 20, 140);
        
        doc.text("Подпись исполнителя: ___________________", 20, 160);
        doc.text("Подпись заказчика: ___________________", 120, 160);

        doc.save(`Akt_HVAC_${client}.pdf`);
    }
</script>

</body>
</html>
