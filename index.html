<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CoolInstall | Ставим сами и экономим</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #00f2ff; --bg: #05070a; --card: rgba(255, 255, 255, 0.03); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #fff; line-height: 1.6; -webkit-tap-highlight-color: transparent; }
        
        .p-header { position: fixed; top: 0; left: 0; right: 0; background: rgba(5,7,10,0.95); backdrop-filter: blur(15px); z-index: 2000; padding: 15px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .p-fill { width: 0%; height: 4px; background: var(--accent); box-shadow: 0 0 15px var(--accent); transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 2px; margin-top: 8px; }

        .bento { background: var(--card); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; padding: 20px; }
        .neon-text { color: var(--accent); text-shadow: 0 0 10px rgba(0, 242, 255, 0.4); }
        
        input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 14px; color: white; width: 100%; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--accent); background: rgba(255,255,255,0.08); }
        
        .temp-knob { text-align: center; padding: 15px; border-radius: 20px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05); }
        .temp-val { font-size: 3.5rem; font-weight: 800; color: var(--accent); letter-spacing: -2px; }
        .temp-slider { width: 100%; -webkit-appearance: none; height: 4px; background: #222; border-radius: 10px; }
        .temp-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 24px; height: 24px; background: #fff; border: 4px solid var(--accent); border-radius: 50%; cursor: pointer; }

        .btn-main { background: var(--accent); color: #000; font-weight: 800; border-radius: 12px; padding: 16px; width: 100%; border: none; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn-main:active { transform: scale(0.96); opacity: 0.9; }
        
        .terminal { background: #000; padding: 12px; border-radius: 12px; font-family: monospace; font-size: 11px; color: #00ffaa; min-height: 80px; border: 1px solid #111; overflow-y: auto; }
        .game-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 15px; font-size: 10px; font-weight: 900; color: #555; transition: 0.3s; }
        .game-btn.active { color: var(--accent); border-color: var(--accent); background: rgba(0,242,255,0.05); box-shadow: 0 0 10px rgba(0, 242, 255, 0.2); }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 3000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #0a0c10; border: 2px solid #ff0055; border-radius: 24px; padding: 30px; text-align: center; max-width: 400px; }

        nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: rgba(10,15,20,0.9); backdrop-filter: blur(20px); border-radius: 20px; height: 65px; display: flex; justify-content: space-around; align-items: center; z-index: 1000; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .nav-link { color: #444; font-size: 1.2rem; transition: 0.3s; }
        .nav-link.active { color: var(--accent); transform: translateY(-3px); }
    </style>
</head>
